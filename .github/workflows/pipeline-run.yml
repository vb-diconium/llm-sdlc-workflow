name: "🤖 Pipeline — Run from Issue"

on:
  issues:
    types: [labeled]

# Only fire when the run-pipeline label is added
jobs:
  gate:
    if: github.event.label.name == 'run-pipeline'
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.parse.outputs.project_name }}
      model:        ${{ steps.parse.outputs.model }}
      visibility:   ${{ steps.parse.outputs.visibility }}
      flags:        ${{ steps.parse.outputs.flags }}
      req_file:     ${{ steps.parse.outputs.req_file }}
    steps:
      - uses: actions/checkout@v4

      - name: Post "starting" comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🚀 Pipeline starting',
                '',
                `**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                '',
                'Parsing requirements from this issue body…',
              ].join('\n')
            })

      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys

          body = os.environ["ISSUE_BODY"]
          issue_num = os.environ["ISSUE_NUMBER"]

          def extract(label):
              """Extract content under a markdown ### heading."""
              pattern = rf"### {re.escape(label)}\s*\n+(.*?)(?=\n###|\Z)"
              m = re.search(pattern, body, re.DOTALL)
              return m.group(1).strip() if m else ""

          project_name = re.sub(r"[^a-zA-Z0-9\-_]", "-", extract("Project Name").strip())
          model        = extract("LLM Model").strip() or "claude-haiku-4-5-20251001"
          visibility   = extract("Output Repo Visibility").strip() or "private"
          requirements = extract("Requirements").strip()
          extra_flags  = extract("Extra flags (optional)").strip()

          # Parse service checkboxes
          flags_raw = extract("Services to generate")
          flags = []
          if re.search(r"\[x\].*--no-bff",        flags_raw, re.I): flags.append("--no-bff")
          if re.search(r"\[x\].*--no-frontend",    flags_raw, re.I): flags.append("--no-frontend")
          if re.search(r"\[x\].*--mobile",         flags_raw, re.I): flags.append("--mobile")
          if extra_flags:
              flags.append(extra_flags)

          if not project_name:
              print("ERROR: project_name is empty", file=sys.stderr)
              sys.exit(1)
          if not requirements:
              print("ERROR: requirements are empty", file=sys.stderr)
              sys.exit(1)

          req_file = f"/tmp/requirements_{issue_num}.txt"
          with open(req_file, "w") as f:
              f.write(requirements)

          gho = os.environ.get("GITHUB_OUTPUT", "/dev/stdout")
          with open(gho, "a") as out:
              out.write(f"project_name={project_name}\n")
              out.write(f"model={model}\n")
              out.write(f"visibility={visibility}\n")
              out.write(f"flags={' '.join(flags)}\n")
              out.write(f"req_file={req_file}\n")

          print(f"project_name={project_name}")
          print(f"model={model}")
          print(f"flags={' '.join(flags)}")
          print(f"req_file={req_file}")
          PYEOF

  run-pipeline:
    needs: gate
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ needs.gate.outputs.project_name }}
      OUTPUT_REPO:  ${{ github.repository_owner }}/${{ needs.gate.outputs.project_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Write requirements file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PYEOF'
          import os, re
          body = os.environ["ISSUE_BODY"]
          issue_num = os.environ["ISSUE_NUMBER"]
          pattern = r"### Requirements\s*\n+(.*?)(?=\n###|\Z)"
          m = re.search(pattern, body, re.DOTALL)
          reqs = m.group(1).strip() if m else body
          req_file = f"/tmp/requirements_{issue_num}.txt"
          with open(req_file, "w") as f:
              f.write(reqs)
          print(f"Wrote {len(reqs)} chars to {req_file}")
          PYEOF

      - name: Run pipeline
        env:
          PIPELINE_API_KEY:  ${{ secrets.PIPELINE_API_KEY }}
          PIPELINE_BASE_URL: ${{ vars.PIPELINE_BASE_URL }}
          PIPELINE_MODEL:    ${{ needs.gate.outputs.model }}
          GH_TOKEN:          ${{ secrets.PIPELINE_GITHUB_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python main.py \
            --requirements "/tmp/requirements_${{ github.event.issue.number }}.txt" \
            --project-name "${{ env.PROJECT_NAME }}" \
            --model "${{ needs.gate.outputs.model }}" \
            --auto \
            ${{ needs.gate.outputs.flags }}

      # ── Publish generated code to a new repo ───────────────────────────────
      - name: Create output repo (or skip if exists)
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_GITHUB_PAT }}
        run: |
          gh repo create "${{ env.OUTPUT_REPO }}" \
            --${{ needs.gate.outputs.visibility }} \
            --description "Generated by llm-sdlc-workflow — issue #${{ github.event.issue.number }}" \
            || echo "Repo already exists — will push to existing repo"

      - name: Push generated code to output repo
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_GITHUB_PAT }}
        run: |
          # Find the generated code directory
          RUN_DIR=$(ls -d artifacts/${PROJECT_NAME}_run_* 2>/dev/null | sort | tail -1)
          CODE_DIR="${RUN_DIR}/${PROJECT_NAME}"

          if [ ! -d "$CODE_DIR" ]; then
            echo "ERROR: Could not find generated code at $CODE_DIR"
            ls artifacts/ || true
            exit 1
          fi

          cd "$CODE_DIR"
          git init -b main
          git config user.email "pipeline-bot@github-actions"
          git config user.name  "LLM SDLC Pipeline"
          git add -A
          git commit -m "feat: initial project generated by llm-sdlc-workflow

          Source: ${{ github.repository }}#${{ github.event.issue.number }}
          Pipeline run: ${{ github.run_id }}
          Model: ${{ needs.gate.outputs.model }}"

          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${{ env.OUTPUT_REPO }}.git
          git push -u origin main --force

      # ── Upload all artifacts (JSON + DECISIONS_LOG.md) ─────────────────────
      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_number }}
          path: artifacts/
          retention-days: 90

      - name: Create GitHub Release with pipeline artifacts
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_GITHUB_PAT }}
        run: |
          RUN_DIR=$(ls -d artifacts/${PROJECT_NAME}_run_* 2>/dev/null | sort | tail -1)
          DECISIONS_LOG="${RUN_DIR}/DECISIONS_LOG.md"
          REPORT="${RUN_DIR}/00_pipeline_report.json"

          # Build release notes
          NOTES="## Pipeline Run #${{ github.run_number }}\n\n"
          NOTES+="**Source issue:** ${{ github.repository }}#${{ github.event.issue.number }}\n"
          NOTES+="**Actions run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n"
          if [ -f "$DECISIONS_LOG" ]; then
            NOTES+="$(cat "$DECISIONS_LOG")"
          fi

          # Zip the full run directory
          zip -r "pipeline-run-${{ github.run_number }}.zip" "$RUN_DIR/"

          gh release create "pipeline-run-${{ github.run_number }}" \
            "pipeline-run-${{ github.run_number }}.zip" \
            --repo "${{ env.OUTPUT_REPO }}" \
            --title "Pipeline run #${{ github.run_number }}" \
            --notes "$(printf '%b' "$NOTES")"

      # ── Post result comment on the original issue ──────────────────────────
      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const run_url = `${{ github.server_url }}/${owner}/${repo}/actions/runs/${{ github.run_id }}`;
            const out_repo = `https://github.com/${owner}/${{ env.PROJECT_NAME }}`;
            const release_url = `${out_repo}/releases/tag/pipeline-run-${{ github.run_number }}`;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body: [
                '## ✅ Pipeline completed successfully',
                '',
                `| | |`,
                `|---|---|`,
                `| **Generated repo** | [${owner}/${{ env.PROJECT_NAME }}](${out_repo}) |`,
                `| **Artifacts + DECISIONS_LOG.md** | [Release pipeline-run-${{ github.run_number }}](${release_url}) |`,
                `| **Actions run** | [#${{ github.run_number }}](${run_url}) |`,
                '',
                '---',
                '**To resume from a specific stage** (e.g. after a review failure):',
                `Run the [Resume Pipeline](${context.server_url}/${owner}/${repo}/actions/workflows/pipeline-resume.yml) workflow`,
                `with **Run artifact name** = \`pipeline-run-${{ github.run_number }}\` and **Issue number** = \`#${context.issue.number}\`.`,
              ].join('\n')
            });
            // Remove the run-pipeline label so re-labelling triggers a fresh run
            await github.rest.issues.removeLabel({
              owner, repo,
              issue_number: context.issue.number,
              name: 'run-pipeline'
            }).catch(() => {});  // ignore if already removed

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const run_url = `${{ github.server_url }}/${owner}/${repo}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Pipeline failed',
                '',
                `**Actions run (with logs):** [#${{ github.run_number }}](${run_url})`,
                '',
                '**To retry from a specific stage** without starting over:',
                `1. Download the artifact \`pipeline-run-${{ github.run_number }}\` from the run above`,
                `2. Run the [Resume Pipeline](${context.server_url}/${owner}/${repo}/actions/workflows/pipeline-resume.yml) workflow`,
                '',
                '**To start fresh:** remove and re-add the `run-pipeline` label on this issue.',
              ].join('\n')
            });
            await github.rest.issues.removeLabel({
              owner, repo,
              issue_number: context.issue.number,
              name: 'run-pipeline'
            }).catch(() => {});
